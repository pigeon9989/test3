version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule: { interval: weekly, day: monday, time: '09:00', timezone: 'Asia/Seoul' }
    open-pull-requests-limit: 5
    labels: ['deps']
    commit-message: { prefix: 'chore(deps)' }
    groups:
      react:           { patterns: ['react', 'react-dom', '@types/react*'] }
      module-federation: { patterns: ['@module-federation/*'] }
      vite:            { patterns: ['vite', '@vitejs/*', 'vitest'] }
      types:           { patterns: ['@types/*'], exclude-patterns: ['@types/react*'] }
    ignore:
      # Host runs React 18.3; modules must match major for singleton sharing.
      - dependency-name: react
        update-types: [version-update:semver-major]
      - dependency-name: react-dom
        update-types: [version-update:semver-major]

  - package-ecosystem: github-actions
    directory: '/'
    schedule: { interval: weekly }
    open-pull-requests-limit: 3
    labels: ['ci']
    commit-message: { prefix: 'chore(ci)' }
