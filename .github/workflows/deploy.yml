name: build · scan · deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  # ───────────────────── security gates (direct binaries — no 3rd-party actions) ─
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        run: |
          curl -sSL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tgz
          ./gitleaks detect --source . --redact --verbose --exit-code 1

      - name: semgrep
        run: |
          pipx install semgrep || pip install semgrep
          semgrep scan --config p/owasp-top-ten --config p/typescript --config p/react --config p/security-audit --error --quiet

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --prod --audit-level=high

      - name: trivy fs
        run: |
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.57.1
          trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 .

  # ─────────────────────── build & test (produces the Pages artifact) ───────────
  build:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

      # GitHub Pages serves the artifact as-is at https://<owner>.github.io/<repo>/.
      # Vite's `base: '/test3/'` in vite.config.ts makes asset URLs match.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ───────────────────────────────── deploy ─────────────────────────────────
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.pages.outputs.page_url }}
    steps:
      - id: pages
        uses: actions/deploy-pages@v4
