name: build · scan · deploy (action-less)

# Designed to survive `codeload.github.com` outages: we do not rely on any
# `uses:` action that has to be downloaded from a GitHub-hosted tarball.
# Everything is plain shell against tools already present on the runner
# image (git, curl, node-via-curl). Deploy goes to a `gh-pages` branch
# instead of `actions/deploy-pages` so the only Pages dependency is the
# branch-build pipeline, configured separately on the repo Pages settings.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20.18.0'
  PNPM_VERSION: '9.15.0'

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: checkout (raw git, no actions/checkout)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config --global init.defaultBranch main
          git init -q
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          # Shallow fetch the exact commit so a force-push to main doesn't race.
          git fetch --depth 1 origin "${{ github.sha }}"
          git checkout -q FETCH_HEAD

      - name: install node (direct binary, no actions/setup-node)
        run: |
          set -euo pipefail
          NODE_DIR="/opt/hostedtoolcache/node-${NODE_VERSION}"
          mkdir -p "$NODE_DIR"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.xz" \
            | tar -xJ --strip-components=1 -C "$NODE_DIR"
          echo "$NODE_DIR/bin" >> "$GITHUB_PATH"
          "$NODE_DIR/bin/node" --version
          "$NODE_DIR/bin/npm"  --version

      - name: install pnpm (npm i -g, no pnpm/action-setup)
        run: |
          set -euo pipefail
          npm install -g "pnpm@${PNPM_VERSION}"
          pnpm --version

      - name: gitleaks (secrets) — BLOCKING
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tgz
          ./gitleaks detect --source . --redact --verbose --exit-code 1

      - name: semgrep (SAST) — BLOCKING
        run: |
          set -euo pipefail
          python3 -m pip install --quiet semgrep
          semgrep scan --config p/owasp-top-ten --config p/typescript --config p/react --error --quiet

      - name: install deps
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (HIGH+) — BLOCKING
        run: pnpm audit --prod --audit-level=high

      - name: trivy fs — INFORMATIONAL
        # Best-effort scan. trivy fetches its CVE DB from GitHub Releases,
        # which is currently flaky alongside the broader GitHub incident.
        # `continue-on-error` keeps the pipeline moving when trivy can't
        # install — actual blocking guards are gitleaks / semgrep / pnpm audit.
        continue-on-error: true
        run: |
          set +e
          curl -fsSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.57.1 || { echo "::warning::trivy install failed — skipping"; exit 0; }
          trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 . || true
          exit 0

      - name: typecheck + test + build
        run: |
          set -euo pipefail
          pnpm typecheck
          pnpm test
          pnpm build

      - name: deploy → gh-pages branch (only on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd dist
          git init -q -b gh-pages
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          echo "deploy ${GITHUB_SHA::7}" > .pages-deploy.txt
          git add -A
          git commit -q -m "deploy ${GITHUB_SHA::7}

          source: ${{ github.sha }}
          run:    ${{ github.run_id }}"
          # Force-push: gh-pages is a generated artifact, not source-of-truth.
          git push -q --force origin gh-pages
          echo "::notice::Pages branch updated — pages-build-deployment will publish in 30-60s"
