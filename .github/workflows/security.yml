name: security · scan

# Security scans live in their own workflow so they don't gate deploys
# during PoC. Failures here surface in the repo's "Actions" tab and the
# Security tab (when SARIF upload is wired) but don't block Pages release.
# Promote to a deploy gate once each tool is known-clean.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.15.0'

jobs:
  scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks
        run: |
          curl -sSL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf gitleaks.tgz
          ./gitleaks detect --source . --redact --verbose --exit-code 1

      - name: semgrep
        run: |
          python3 -m pip install --quiet semgrep
          semgrep scan --config p/owasp-top-ten --config p/typescript --config p/react --config p/security-audit --error --quiet

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (high+)
        run: pnpm audit --prod --audit-level=high

      - name: trivy fs (informational)
        run: |
          curl -sSL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.57.1
          trivy fs --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 .
